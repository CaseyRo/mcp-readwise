[[server]]
name = "ubuntu-smurf-mirror"
[server.config]
address = "http://100.118.241.89:8120"
enabled = true

[[stack]]
name = "git-mcp-readwise"
description = "MCP server for Readwise (FastMCP 3.x)"
deploy = true
tags = ["mcp"]

[stack.config]
server_id = "ubuntu-smurf-mirror"
git_provider = "github.com"
git_account = "caseyro"
repo = "CaseyRo/mcp-readwise"
branch = "main"
webhook_enabled = true
auto_pull = true
run_build = true
file_paths = ["compose.yaml"]
environment = """
READWISE_TOKEN = [[READWISE_TOKEN]]
MCP_API_KEY = [[MCP_READWISE_API_KEY]]
MCP_READWISE_PUBLIC_URL = https://mcp-readwise.cdit-dev.de
"""
