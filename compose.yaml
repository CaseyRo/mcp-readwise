services:
  mcp-readwise:
    build: .
    restart: unless-stopped
    ports:
      - "8010:8000"
    environment:
      - TRANSPORT=http
      - HOST=0.0.0.0
      - READWISE_TOKEN=${READWISE_TOKEN:-}
      - MCP_API_KEY=${MCP_API_KEY:-}
      - FASTMCP_HOME=/data/fastmcp
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - fastmcp-data:/data/fastmcp

volumes:
  fastmcp-data:
